name: Build MARSS feed and deploy to Neocities

on:
  push:
    branches: [ main ]
    paths:
      - "changelog.md"
      - ".github/workflows/marss-neocities.yml"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install MARSS and dependencies
        run: |
          npm install --save-dev marss
          npm install --save-dev @benchristel/taste

      - name: Build RSS feed
        run: npx marss changelog.md colophon_feed.rss

      - name: Deploy colophon_feed.rss to Neocities
        uses: bcomnes/deploy-to-neocities@v3
        with:
          api_token: ${{ secrets.NEOCITIES_API_TOKEN }}
          dist_dir: .
          cleanup: false
          include: |
            colophon_feed.rss
